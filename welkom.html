<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milo activeren</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
    }
    .check {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(20,184,166,0.12);
      border: 2px solid #14B8A6;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
    }
    h1 { font-size: 30px; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .sub { font-size: 16px; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 36px; }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
    input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #14B8A6; }
    input::placeholder { color: rgba(255,255,255,0.3); }

    .hint { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 5px; }

    button {
      width: 100%;
      background: #14B8A6;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      padding: 16px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .success { display: none; text-align: center; }
    .success .wa-icon { font-size: 56px; margin-bottom: 20px; }
    .success h2 { font-size: 26px; margin-bottom: 12px; }
    .success p { font-size: 16px; color: rgba(255,255,255,0.55); line-height: 1.7; }

    .error-msg { color: #f87171; font-size: 14px; margin-top: 12px; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div id="form-view">
      <div class="check">✓</div>
      <h1>Bijna klaar!</h1>
      <p class="sub">Vul je gegevens in — dan sturen we Milo meteen naar je WhatsApp.</p>

      <div class="form-group">
        <label>Hoe heet je?</label>
        <input type="text" id="name" placeholder="Thomas" autocomplete="given-name">
      </div>
      <div class="form-group">
        <label>Je WhatsApp nummer</label>
        <input type="tel" id="phone" placeholder="06 12345678" autocomplete="tel">
        <div class="hint">Zorg dat WhatsApp op dit nummer actief is.</div>
      </div>

      <button id="submit-btn" onclick="activate()">Milo activeren →</button>
      <div class="error-msg" id="error-msg">Er ging iets mis. Probeer het opnieuw.</div>
    </div>

    <div class="success" id="success-view">
      <div class="wa-icon">💬</div>
      <h2>Milo is onderweg!</h2>
      <p>Check je WhatsApp — je krijgt zo een berichtje van Milo. Reageer gewoon en de kennismaking begint.</p>
    </div>
  </div>

  <script>
    // Get session_id from URL
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session') || '';

    async function activate() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');

      if (!name) { document.getElementById('name').focus(); return; }
      if (!phone) { document.getElementById('phone').focus(); return; }

      btn.disabled = true;
      btn.textContent = 'Even geduld...';
      errEl.style.display = 'none';

      try {
        const res = await fetch('https://api.heymilo.nl/api/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone, session_id: sessionId })
        });
        const data = await res.json();

        if (data.ok) {
          document.getElementById('form-view').style.display = 'none';
          document.getElementById('success-view').style.display = 'block';
        } else {
          throw new Error(data.error || 'Fout');
        }
      } catch (e) {
        errEl.textContent = 'Er ging iets mis: ' + (e.message || 'probeer opnieuw');
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Milo activeren →';
      }
    }

    // Allow Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') activate();
    });
  </script>
</body>
</html>
